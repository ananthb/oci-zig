site_name: runz
site_description: OCI container runtime and library in Zig
site_url: https://ananthb.github.io/runz/
repo_url: https://github.com/ananthb/runz

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
    - scheme: slate
      primary: teal
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

nav:
  - Overview: index.md
  - API Reference: api/index.html

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - tables
